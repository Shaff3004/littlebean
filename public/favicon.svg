  <path d="M78 90C82 80 84 68 80 56" stroke="#C9A227" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Head -->
  <circle cx="79" cy="52" r="8" fill="#C9A227"/>
  <!-- Eye -->
  <circle cx="81" cy="50" r="2.2" fill="#181818"/>
  <!-- Beak -->
  <path d="M87 52L100 50" stroke="#C9A227" stroke-width="4" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M58 116L54 138M72 116L76 138" stroke="#C9A227" stroke-width="4" stroke-linecap="round"/>
  <!-- Toddler head -->
