  <ellipse cx="65" cy="100" rx="22" ry="16" fill="#C9A227" opacity="0.85"/>
  <!-- Wing -->
  <path d="M48 96C42 92 40 100 46 104C50 106 56 105 54 101" fill="#C9A227" opacity="0.5"/>
