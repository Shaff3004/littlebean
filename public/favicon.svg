  <!-- Toddler arm reaching -->
  <path d="M112 118C105 113 95 108 88 103" stroke="#C9A227" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Heart between them -->
  <path d="M92 70C92 66 95 65 97 68C99 65 102 66 102 70C102 74 97 78 97 78C97 78 92 74 92 70Z" fill="#C9A227" opacity="0.6"/>
